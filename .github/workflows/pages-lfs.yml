name: Deploy Pages with LFS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS assets
        run: |
          git lfs pull
          test "$(head -c 3 2016-05-25-machine-learning-notes/cover.jpg | xxd -p)" = "ffd8ff"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
